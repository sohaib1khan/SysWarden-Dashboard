server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Service worker — must never be served stale ───────────────
    # The SW controls caching for the whole app; if the browser caches
    # an old sw.js it will keep serving stale assets after a redeploy.
    location ~* sw\.js$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Service-Worker-Allowed "/";
        expires off;
        try_files $uri =404;
    }

    # Workbox runtime chunks are content-hashed → cache forever
    location ~* workbox- {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── API proxy ────────────────────────────────────────────────
    # Forward all /api and /health requests to the backend container.
    # This makes the dashboard URL the single public entry point —
    # no CORS headers are needed and port 8000 can be firewalled
    # off from the public internet.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket proxy ──────────────────────────────────────────
    # Agents connect via wss://domain/ws/agent — must be upgraded
    # to a real WebSocket connection (HTTP 101). Without the Upgrade
    # headers nginx returns 200 and the agent sees a failed handshake.
    location /ws/ {
        proxy_pass          http://backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        # Keep the WebSocket alive — agents are long-lived connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location /health {
        proxy_pass http://backend:8000;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    # React Router handles all client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy       "strict-origin-when-cross-origin";
    add_header Permissions-Policy    "geolocation=(), microphone=(), camera=()";
}
